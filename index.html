<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garmin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ── Grundlagen ───────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f1117;
      --card-bg: #1a1d27;
      --card-border: #2a2d3a;
      --text: #e4e6ed;
      --text-muted: #8b8fa3;
      --accent: #6c8cff;
      --green: #4ade80;
      --red: #f87171;
      --orange: #fb923c;
      --purple: #a78bfa;
      --cyan: #22d3ee;
      --pink: #f472b6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Header ───────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .header .updated {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ── Zeitraum-Auswahl ─────────────────────────────── */
    .range-selector {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .range-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    .range-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .range-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Gewicht-Eingabe ─────────────────────────────── */
    .weight-input-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .weight-input-bar input {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      width: 120px;
      text-align: center;
    }

    .weight-input-bar input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .weight-input-bar button {
      background: var(--pink);
      border: none;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .weight-input-bar button:hover {
      opacity: 0.85;
    }

    .weight-input-bar .save-msg {
      font-size: 0.85rem;
      min-width: 100px;
    }

    /* ── Fehlermeldung ────────────────────────────────── */
    .error-msg {
      text-align: center;
      padding: 40px;
      color: var(--red);
      font-size: 1.1rem;
    }

    /* ── Übersichtskarten ─────────────────────────────── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 18px;
      text-align: center;
    }

    .card .label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .card .value {
      font-size: 2rem;
      font-weight: 700;
    }

    .card .trend {
      font-size: 0.85rem;
      margin-top: 5px;
    }

    .trend.up { color: var(--red); }
    .trend.down { color: var(--green); }
    .trend.neutral { color: var(--text-muted); }

    /* Spezielle Farbgebung je Karte */
    .card.hr .value { color: var(--red); }
    .card.sleep .value { color: var(--purple); }
    .card.battery .value { color: var(--green); }
    .card.steps .value { color: var(--cyan); }
    .card.hrv .value { color: var(--accent); }
    .card.stress .value { color: var(--orange); }
    .card.weight .value { color: var(--pink); }

    /* ── Chart-Container ──────────────────────────────── */
    .charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .chart-box {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
    }

    .chart-box h3 {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 15px;
      color: var(--text-muted);
    }

    .chart-box canvas {
      max-height: 280px;
    }

    /* ── Aktivitäten-Tabelle ──────────────────────────── */
    .activities-section {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .activities-section h3 {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 15px;
      color: var(--text-muted);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 2px solid var(--card-border);
      color: var(--text-muted);
      font-weight: 500;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--card-border);
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(108, 140, 255, 0.05);
    }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 600px) {
      body { padding: 10px; }

      .cards {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .card .value { font-size: 1.5rem; }

      .charts {
        grid-template-columns: 1fr;
      }

      .chart-box {
        padding: 15px;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>Garmin Dashboard</h1>
    <div class="updated" id="lastUpdated">Lade Daten...</div>
  </div>

  <!-- Fehlermeldung (versteckt) -->
  <div class="error-msg" id="errorMsg" style="display:none;"></div>

  <!-- Hauptinhalt (versteckt bis Daten geladen) -->
  <div id="mainContent" style="display:none;">

    <!-- Zeitraum-Auswahl -->
    <div class="range-selector">
      <button class="range-btn" data-days="10">10 Tage</button>
      <button class="range-btn" data-days="30">30 Tage</button>
      <button class="range-btn" data-days="90">90 Tage</button>
      <button class="range-btn" data-days="365">1 Jahr</button>
      <button class="range-btn" data-days="730">2 Jahre</button>
      <button class="range-btn" data-days="1095">3 Jahre</button>
      <button class="range-btn active" data-days="1460">4 Jahre</button>
    </div>

    <!-- Übersichtskarten -->
    <div class="cards">
      <div class="card hr">
        <div class="label">Ruhepuls</div>
        <div class="value" id="cardHr">--</div>
        <div class="trend" id="cardHrTrend"></div>
      </div>
      <div class="card sleep">
        <div class="label">Schlaf-Score</div>
        <div class="value" id="cardSleep">--</div>
        <div class="trend" id="cardSleepTrend"></div>
      </div>
      <div class="card battery">
        <div class="label">Body Battery</div>
        <div class="value" id="cardBattery">--</div>
        <div class="trend" id="cardBatteryTrend"></div>
      </div>
      <div class="card steps">
        <div class="label">Schritte</div>
        <div class="value" id="cardSteps">--</div>
        <div class="trend" id="cardStepsTrend"></div>
      </div>
      <div class="card hrv">
        <div class="label">HRV</div>
        <div class="value" id="cardHrv">--</div>
        <div class="trend" id="cardHrvTrend"></div>
      </div>
      <div class="card stress">
        <div class="label">Stress</div>
        <div class="value" id="cardStress">--</div>
        <div class="trend" id="cardStressTrend"></div>
      </div>
      <div class="card weight" id="cardWeightBox" style="display:none;">
        <div class="label">Gewicht</div>
        <div class="value" id="cardWeight">--</div>
        <div class="trend" id="cardWeightTrend"></div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts">
      <div class="chart-box">
        <h3 id="titleHr">Ruhepuls</h3>
        <canvas id="chartHr"></canvas>
      </div>
      <div class="chart-box">
        <h3 id="titleHrv">HRV</h3>
        <canvas id="chartHrv"></canvas>
      </div>
      <div class="chart-box">
        <h3 id="titleSleepPhases">Schlaf – Phasen</h3>
        <canvas id="chartSleepPhases"></canvas>
      </div>
      <div class="chart-box">
        <h3 id="titleSleepScore">Schlaf-Score</h3>
        <canvas id="chartSleepScore"></canvas>
      </div>
      <div class="chart-box">
        <h3 id="titleBattery">Body Battery</h3>
        <canvas id="chartBattery"></canvas>
      </div>
      <div class="chart-box">
        <h3 id="titleStress">Stress</h3>
        <canvas id="chartStress"></canvas>
      </div>
      <div class="chart-box">
        <h3 id="titleSteps">Schritte</h3>
        <canvas id="chartSteps"></canvas>
      </div>
      <div class="chart-box" id="spo2Section">
        <h3 id="titleSpo2">SpO2</h3>
        <canvas id="chartSpo2"></canvas>
      </div>
    </div>

    <!-- Gewicht-Eingabe -->
    <div class="weight-input-bar">
      <input type="number" id="weightInput" placeholder="z.B. 90.3" step="0.1" min="20" max="300">
      <span style="color:var(--text-muted);">kg</span>
      <input type="date" id="weightDate">
      <button onclick="saveWeight()">Speichern</button>
      <span class="save-msg" id="saveMsg"></span>
    </div>

    <!-- Gewicht (wird nur angezeigt wenn Daten vorhanden) -->
    <div class="charts" id="weightSection" style="display:none;">
      <div class="chart-box">
        <h3 id="titleWeight">Gewicht</h3>
        <canvas id="chartWeight"></canvas>
      </div>
      <div class="chart-box" id="fatSection" style="display:none;">
        <h3 id="titleFat">Körperfett</h3>
        <canvas id="chartFat"></canvas>
      </div>
    </div>

    <!-- Aktivitäten -->
    <div class="activities-section">
      <h3>Letzte 20 Aktivitäten</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Datum</th>
              <th>Typ</th>
              <th>Name</th>
              <th>Dauer</th>
              <th>Distanz</th>
              <th>&Oslash; HR</th>
              <th>Kalorien</th>
            </tr>
          </thead>
          <tbody id="activitiesBody">
          </tbody>
        </table>
      </div>
    </div>

  </div>

<script>
/* ================================================================
   Garmin Dashboard – Vanilla JavaScript
   ================================================================ */

// ── Globale Variablen ────────────────────────────────────────────
var allData = null;        // Komplette Daten aus JSON
var weightData = null;     // Gewichtsdaten aus Huawei Health
var activeCharts = [];     // Aktive Chart-Instanzen (zum Zerstören)
var currentDays = 0;       // Aktueller Zeitraum (0 = alle)

// ── Hilfsfunktionen ──────────────────────────────────────────────

/** Datum im kurzen Format: TT.MM. (für <= 90 Tage) */
function formatDateShort(dateStr) {
  if (!dateStr) return '';
  var p = dateStr.split('-');
  return p.length >= 3 ? p[2] + '.' + p[1] + '.' : dateStr;
}

/** Datum mit Jahr: TT.MM.YY (für > 90 Tage) */
function formatDateMedium(dateStr) {
  if (!dateStr) return '';
  var p = dateStr.split('-');
  return p.length >= 3 ? p[2] + '.' + p[1] + '.' + p[0].slice(2) : dateStr;
}

/** Volles Datum: TT.MM.YYYY */
function formatDateFull(dateStr) {
  if (!dateStr) return '';
  var p = dateStr.split('-');
  return p.length >= 3 ? p[2] + '.' + p[1] + '.' + p[0] : dateStr;
}

/** Trend-Pfeil und CSS-Klasse berechnen */
function getTrend(today, yesterday, lowerIsBetter) {
  if (today == null || yesterday == null) return { text: '', cls: 'neutral' };
  var diff = today - yesterday;
  if (diff === 0) return { text: '= gleich', cls: 'neutral' };
  var arrow = diff > 0 ? '↑' : '↓';
  var absDiff = Math.abs(Math.round(diff * 10) / 10);
  var cls = lowerIsBetter
    ? (diff < 0 ? 'down' : 'up')
    : (diff > 0 ? 'down' : 'up');
  return { text: arrow + ' ' + absDiff, cls: cls };
}

/** Durchschnitt der letzten N nicht-null Werte eines Feldes berechnen */
function avgField(data, field, n) {
  var vals = [];
  for (var i = data.length - 1; i >= 0 && vals.length < n; i--) {
    if (data[i][field] != null) vals.push(data[i][field]);
  }
  if (vals.length === 0) return null;
  return Math.round(vals.reduce(function(a,b){ return a+b; }, 0) / vals.length * 10) / 10;
}

/** Perioden-Vergleich: Durchschnitt aktuelle Periode vs. vorherige gleiche Periode */
function getPeriodTrend(allDaily, field, days, lowerIsBetter) {
  if (!allDaily || allDaily.length === 0) return { text: '', cls: 'neutral' };

  var total = allDaily.length;
  // Aktuelle Periode = letzte 'days' Tage (oder alles bei days=0)
  var periodLen = days > 0 ? Math.min(days, total) : Math.floor(total / 2);
  var currentSlice = allDaily.slice(Math.max(0, total - periodLen));
  var prevSlice = allDaily.slice(Math.max(0, total - periodLen * 2), Math.max(0, total - periodLen));

  if (prevSlice.length === 0) return { text: '', cls: 'neutral' };

  // Durchschnitte berechnen
  var curVals = currentSlice.filter(function(d) { return d[field] != null; }).map(function(d) { return d[field]; });
  var prevVals = prevSlice.filter(function(d) { return d[field] != null; }).map(function(d) { return d[field]; });

  if (curVals.length === 0 || prevVals.length === 0) return { text: '', cls: 'neutral' };

  var curAvg = curVals.reduce(function(a,b){ return a+b; }, 0) / curVals.length;
  var prevAvg = prevVals.reduce(function(a,b){ return a+b; }, 0) / prevVals.length;

  var diff = curAvg - prevAvg;
  if (Math.abs(diff) < 0.05) return { text: '= gleich', cls: 'neutral' };
  var arrow = diff > 0 ? '↑' : '↓';
  var absDiff = Math.abs(Math.round(diff * 10) / 10);
  var cls = lowerIsBetter
    ? (diff < 0 ? 'down' : 'up')
    : (diff > 0 ? 'down' : 'up');
  return { text: arrow + ' ' + absDiff, cls: cls };
}

/** Gleitender Durchschnitt berechnen fuer grosse Datensaetze */
function smoothData(data, count) {
  // Bei wenigen Datenpunkten: keine Glaettung
  if (count <= 90) return data;
  // Fenstergroesse: 7 bei 90-365 Tagen, 14 bei >365
  var window = count <= 365 ? 7 : 14;
  var result = [];
  for (var i = 0; i < data.length; i++) {
    if (data[i] == null) { result.push(null); continue; }
    var sum = 0, n = 0;
    for (var j = Math.max(0, i - Math.floor(window/2)); j <= Math.min(data.length - 1, i + Math.floor(window/2)); j++) {
      if (data[j] != null) { sum += data[j]; n++; }
    }
    result.push(n > 0 ? Math.round(sum / n * 10) / 10 : null);
  }
  return result;
}

/** Wert in Karten-Element setzen */
function setCard(id, value, suffix) {
  var el = document.getElementById(id);
  if (el) el.textContent = value != null ? value + (suffix || '') : '--';
}

/** Trend in Karten-Element setzen */
function setTrend(id, trend) {
  var el = document.getElementById(id);
  if (el) {
    el.textContent = trend.text;
    el.className = 'trend ' + trend.cls;
  }
}

/** Chart.js-Defaults für dunkles Theme */
function setChartDefaults() {
  Chart.defaults.color = '#8b8fa3';
  Chart.defaults.borderColor = '#2a2d3a';
  Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif';
  Chart.defaults.font.size = 12;
  Chart.defaults.plugins.legend.display = false;
  Chart.defaults.elements.line.tension = 0.3;
  Chart.defaults.elements.line.borderWidth = 2;
  Chart.defaults.animation.duration = 400;
  Chart.defaults.responsive = true;
  Chart.defaults.maintainAspectRatio = true;
}

/** Alle aktiven Charts zerstören */
function destroyCharts() {
  activeCharts.forEach(function(c) { c.destroy(); });
  activeCharts = [];
}

/** Punktgröße basierend auf Datenmenge bestimmen */
function getPointRadius(count) {
  if (count <= 31) return 3;
  if (count <= 90) return 2;
  if (count <= 180) return 1;
  return 0;
}

/** Label-Formatter je nach Zeitraum */
function getFormatFn(count) {
  return count > 90 ? formatDateMedium : formatDateShort;
}

/** X-Achsen-Ticks ausdünnen bei vielen Datenpunkten */
function getMaxTicksLimit(count) {
  if (count <= 31) return undefined;
  if (count <= 90) return 15;
  if (count <= 365) return 12;
  return 16;
}

// ── Linienchart erstellen ────────────────────────────────────────
function createLineChart(canvasId, labels, data, color, fillColor, count) {
  var ctx = document.getElementById(canvasId);
  if (!ctx) return null;
  var chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        data: data,
        borderColor: color,
        backgroundColor: fillColor || 'transparent',
        fill: !!fillColor,
        spanGaps: false,
        pointRadius: getPointRadius(count),
        pointHoverRadius: 4,
        pointBackgroundColor: color,
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: false,
          grid: { color: 'rgba(255,255,255,0.05)' },
        },
        x: {
          grid: { display: false },
          ticks: { maxTicksLimit: getMaxTicksLimit(count) }
        }
      },
      plugins: {
        tooltip: {
          backgroundColor: '#1a1d27',
          borderColor: '#2a2d3a',
          borderWidth: 1,
          titleColor: '#e4e6ed',
          bodyColor: '#e4e6ed',
        }
      }
    }
  });
  activeCharts.push(chart);
  return chart;
}

// ── Gewichts-Charts aufbauen ─────────────────────────────────────
function buildWeightCharts(days) {
  var section = document.getElementById('weightSection');
  var cardBox = document.getElementById('cardWeightBox');
  if (!weightData || !weightData.weights || weightData.weights.length === 0) {
    section.style.display = 'none';
    cardBox.style.display = 'none';
    return;
  }

  section.style.display = '';
  cardBox.style.display = '';

  var weights = weightData.weights;

  // Nach Zeitraum filtern
  if (days > 0) {
    var cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - days);
    var cutoffStr = cutoff.toISOString().slice(0, 10);
    weights = weights.filter(function(w) { return w.date >= cutoffStr; });
  }

  if (weights.length === 0) {
    section.style.display = 'none';
    return;
  }

  var count = weights.length;
  var fmt = getFormatFn(count);
  var zeitraumText;
  if (days === 1460) zeitraumText = '(4 Jahre)';
  else if (days === 1095) zeitraumText = '(3 Jahre)';
  else if (days === 730) zeitraumText = '(2 Jahre)';
  else if (days === 365) zeitraumText = '(1 Jahr)';
  else if (days === 0) zeitraumText = '(' + count + ' Messungen)';
  else zeitraumText = '(' + days + ' Tage)';

  document.getElementById('titleWeight').textContent = 'Gewicht (' + count + ' Messungen)';
  document.getElementById('titleFat').textContent = 'Körperfett (' + count + ' Messungen)';

  var labels = weights.map(function(w) { return fmt(w.date); });

  // Gewichtskarte: Durchschnitt letzte 7 Messungen + Periodenvergleich
  var letztes = weights[weights.length - 1];
  setCard('cardWeight', letztes.weight_kg, ' kg');
  // Gewichts-Periodenvergleich
  var allW = weightData.weights;
  var periodLen = days > 0 ? days : Math.floor(allW.length / 2);
  var curW = allW.slice(Math.max(0, allW.length - periodLen));
  var prevW = allW.slice(Math.max(0, allW.length - periodLen * 2), Math.max(0, allW.length - periodLen));
  var curAvgW = curW.length > 0 ? curW.reduce(function(s,w){return s+w.weight_kg;},0)/curW.length : null;
  var prevAvgW = prevW.length > 0 ? prevW.reduce(function(s,w){return s+w.weight_kg;},0)/prevW.length : null;
  setTrend('cardWeightTrend', getTrend(curAvgW, prevAvgW, true));

  // Gewichts-Chart
  createLineChart('chartWeight', labels,
    smoothData(weights.map(function(w) { return w.weight_kg; }), count),
    '#f472b6', 'rgba(244, 114, 182, 0.1)', count);

  // Körperfett-Chart (nur wenn Daten vorhanden)
  var fatSection = document.getElementById('fatSection');
  var fatData = weights.map(function(w) { return w.body_fat_pct || null; });
  var hasFat = fatData.some(function(v) { return v != null; });

  if (hasFat) {
    fatSection.style.display = '';
    createLineChart('chartFat', labels, fatData,
      '#fb923c', 'rgba(251, 146, 60, 0.1)', count);
  } else {
    fatSection.style.display = 'none';
  }
}

// ── Dashboard aufbauen ───────────────────────────────────────────
function buildDashboard(days) {
  currentDays = days;
  destroyCharts();

  var daily = allData.daily;

  // Daten filtern nach Zeitraum
  if (days > 0 && daily.length > days) {
    daily = daily.slice(daily.length - days);
  }

  var count = daily.length;
  var fmt = getFormatFn(count);
  var zeitraumText;
  if (days === 1460) zeitraumText = '(4 Jahre)';
  else if (days === 1095) zeitraumText = '(3 Jahre)';
  else if (days === 730) zeitraumText = '(2 Jahre)';
  else if (days === 365) zeitraumText = '(1 Jahr)';
  else if (days === 0) zeitraumText = '(' + count + ' Tage)';
  else zeitraumText = '(' + days + ' Tage)';

  // Chart-Titel aktualisieren
  document.getElementById('titleHr').textContent = 'Ruhepuls ' + zeitraumText;
  document.getElementById('titleHrv').textContent = 'HRV ' + zeitraumText;
  document.getElementById('titleSleepPhases').textContent = 'Schlaf – Phasen ' + zeitraumText;
  document.getElementById('titleSleepScore').textContent = 'Schlaf-Score ' + zeitraumText;
  document.getElementById('titleBattery').textContent = 'Body Battery ' + zeitraumText;
  document.getElementById('titleStress').textContent = 'Stress ' + zeitraumText;
  document.getElementById('titleSteps').textContent = 'Schritte ' + zeitraumText;
  document.getElementById('titleSpo2').textContent = 'SpO2 ' + zeitraumText;

  // Labels
  var labels = daily.map(function(d) { return fmt(d.date); });

  // ── Karten: aktueller Wert + Perioden-Vergleich ─────
  var heute = daily.length > 0 ? daily[daily.length - 1] : {};

  setCard('cardHr', avgField(daily, 'resting_hr', 7), ' bpm');
  setCard('cardSleep', avgField(daily, 'sleep_score', 7));
  setCard('cardBattery', avgField(daily, 'body_battery_max', 7), '%');
  var avgSteps = avgField(daily, 'steps', 7);
  setCard('cardSteps', avgSteps ? Math.round(avgSteps).toLocaleString('de-DE') : null);
  setCard('cardHrv', avgField(daily, 'hrv', 7), ' ms');
  setCard('cardStress', avgField(daily, 'stress_avg', 7));

  setTrend('cardHrTrend', getPeriodTrend(allData.daily, 'resting_hr', days, true));
  setTrend('cardSleepTrend', getPeriodTrend(allData.daily, 'sleep_score', days, false));
  setTrend('cardBatteryTrend', getPeriodTrend(allData.daily, 'body_battery_max', days, false));
  setTrend('cardStepsTrend', getPeriodTrend(allData.daily, 'steps', days, false));
  setTrend('cardHrvTrend', getPeriodTrend(allData.daily, 'hrv', days, false));
  setTrend('cardStressTrend', getPeriodTrend(allData.daily, 'stress_avg', days, true));

  // ── Chart 1: Ruhepuls ────────────────────────────────
  createLineChart('chartHr', labels,
    smoothData(daily.map(function(d) { return d.resting_hr; }), count),
    '#f87171', 'rgba(248, 113, 113, 0.1)', count);

  // ── Chart 2: HRV ─────────────────────────────────────
  createLineChart('chartHrv', labels,
    smoothData(daily.map(function(d) { return d.hrv; }), count),
    '#6c8cff', 'rgba(108, 140, 255, 0.1)', count);

  // ── Chart 3: Schlafphasen (Stacked Bar) ──────────────
  (function() {
    var ctx = document.getElementById('chartSleepPhases');
    if (!ctx) return;
    var c = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Tiefschlaf',
            data: daily.map(function(d) { return d.deep_sleep_pct || d.deep_sleep_hours; }),
            backgroundColor: '#3b82f6',
          },
          {
            label: 'Leichtschlaf',
            data: daily.map(function(d) { return d.light_sleep_pct || d.light_sleep_hours; }),
            backgroundColor: '#6366f1',
          },
          {
            label: 'REM',
            data: daily.map(function(d) { return d.rem_sleep_pct || d.rem_sleep_hours; }),
            backgroundColor: '#a78bfa',
          }
        ]
      },
      options: {
        scales: {
          x: { stacked: true, grid: { display: false }, ticks: { maxTicksLimit: getMaxTicksLimit(count) } },
          y: {
            stacked: true,
            beginAtZero: true,
            grid: { color: 'rgba(255,255,255,0.05)' },
            title: { display: true, text: 'Stunden' }
          }
        },
        plugins: {
          legend: { display: true, labels: { boxWidth: 12 } },
          tooltip: { backgroundColor: '#1a1d27', borderColor: '#2a2d3a', borderWidth: 1 }
        }
      }
    });
    activeCharts.push(c);
  })();

  // ── Chart 4: Schlaf-Score ────────────────────────────
  createLineChart('chartSleepScore', labels,
    smoothData(daily.map(function(d) { return d.sleep_score; }), count),
    '#a78bfa', 'rgba(167, 139, 250, 0.1)', count);

  // ── Chart 5: Body Battery ────────────────────────────
  createLineChart('chartBattery', labels,
    smoothData(daily.map(function(d) { return d.body_battery_max || d.body_battery_start; }), count),
    '#4ade80', 'rgba(74, 222, 128, 0.1)', count);

  // ── Chart 6: Stress ──────────────────────────────────
  createLineChart('chartStress', labels,
    smoothData(daily.map(function(d) { return d.stress_avg; }), count),
    '#fb923c', 'rgba(251, 146, 60, 0.1)', count);

  // ── Chart 7: Schritte (Bar + Ziellinie) ──────────────
  (function() {
    var ctx = document.getElementById('chartSteps');
    if (!ctx) return;
    var stepsData = daily.map(function(d) { return d.steps; });
    var goalLine = daily.map(function() { return 10000; });

    var c = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Schritte',
            data: stepsData,
            backgroundColor: stepsData.map(function(v) {
              return v >= 10000
                ? 'rgba(34, 211, 238, 0.7)'
                : 'rgba(34, 211, 238, 0.35)';
            }),
            borderRadius: count <= 90 ? 3 : 0,
            barPercentage: count > 180 ? 1.0 : 0.9,
            categoryPercentage: count > 180 ? 1.0 : 0.8,
          },
          {
            label: 'Ziel (10.000)',
            data: goalLine,
            type: 'line',
            borderColor: '#f87171',
            borderDash: [5, 5],
            borderWidth: 2,
            pointRadius: 0,
            fill: false,
          }
        ]
      },
      options: {
        scales: {
          y: {
            beginAtZero: true,
            grid: { color: 'rgba(255,255,255,0.05)' },
          },
          x: { grid: { display: false }, ticks: { maxTicksLimit: getMaxTicksLimit(count) } }
        },
        plugins: {
          legend: { display: true, labels: { boxWidth: 12 } },
          tooltip: { backgroundColor: '#1a1d27', borderColor: '#2a2d3a', borderWidth: 1 }
        }
      }
    });
    activeCharts.push(c);
  })();

  // ── Chart 8: SpO2 (nur anzeigen wenn Daten vorhanden) ──
  (function() {
    var spo2Box = document.getElementById('spo2Section');
    var spo2Vals = daily.filter(function(d) { return d.spo2_avg != null; });
    if (spo2Vals.length === 0) { spo2Box.style.display = 'none'; return; }
    spo2Box.style.display = '';
    var ctx = document.getElementById('chartSpo2');
    if (!ctx) return;
    var c = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          data: smoothData(daily.map(function(d) { return d.spo2_avg; }), count),
          borderColor: '#22d3ee',
          backgroundColor: 'rgba(34, 211, 238, 0.1)',
          fill: true,
          spanGaps: false,
          pointRadius: getPointRadius(count),
          pointHoverRadius: 4,
          pointBackgroundColor: '#22d3ee',
        }]
      },
      options: {
        scales: {
          y: {
            min: 90,
            max: 100,
            grid: { color: 'rgba(255,255,255,0.05)' },
            title: { display: true, text: '%' }
          },
          x: { grid: { display: false }, ticks: { maxTicksLimit: getMaxTicksLimit(count) } }
        },
        plugins: {
          tooltip: { backgroundColor: '#1a1d27', borderColor: '#2a2d3a', borderWidth: 1 }
        }
      }
    });
    activeCharts.push(c);
  })();

  // ── Gewichts-Charts (Huawei Health) ─────────────────
  buildWeightCharts(days);

  // ── Aktivitäten-Tabelle ──────────────────────────────
  var activities = allData.activities || [];
  var tbody = document.getElementById('activitiesBody');
  tbody.innerHTML = '';

  if (activities.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);">Keine Aktivitäten im Zeitraum</td></tr>';
  } else {
    var letzte = activities.slice(0, 20);
    letzte.forEach(function(a) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + formatDateFull(a.date) + '</td>' +
        '<td>' + (a.type || '--') + '</td>' +
        '<td>' + (a.name || '--') + '</td>' +
        '<td>' + (a.duration_minutes != null ? Math.round(a.duration_minutes) + ' min' : '--') + '</td>' +
        '<td>' + (a.distance_km != null ? a.distance_km + ' km' : '--') + '</td>' +
        '<td>' + (a.avg_hr != null ? Math.round(a.avg_hr) + ' bpm' : '--') + '</td>' +
        '<td>' + (a.calories != null ? Math.round(a.calories) + ' kcal' : '--') + '</td>';
      tbody.appendChild(tr);
    });
  }
}

// ── Gewicht speichern ────────────────────────────────────────────

// Datum-Feld auf heute setzen
document.getElementById('weightDate').value = new Date().toISOString().slice(0, 10);

function saveWeight() {
  var input = document.getElementById('weightInput');
  var dateInput = document.getElementById('weightDate');
  var msg = document.getElementById('saveMsg');
  var gewicht = parseFloat(input.value);

  if (!gewicht || gewicht < 20 || gewicht > 300) {
    msg.style.color = 'var(--red)';
    msg.textContent = 'Ungültiges Gewicht';
    return;
  }

  msg.style.color = 'var(--text-muted)';
  msg.textContent = 'Speichere...';

  fetch('/api/weight', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      weight_kg: gewicht,
      date: dateInput.value
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    if (result.ok) {
      msg.style.color = 'var(--green)';
      msg.textContent = '✓ ' + result.saved.weight_kg + ' kg gespeichert';
      input.value = '';

      // Gewichtsdaten neu laden und Dashboard aktualisieren
      fetch('data/weight_data.json')
        .then(function(r) { return r.json(); })
        .then(function(wData) {
          weightData = wData;
          // Info-Text aktualisieren
          var infoEl = document.getElementById('lastUpdated');
          var text = infoEl.textContent.replace(/\| \d+ Gewichtsmessungen/, '| ' + wData.weights.length + ' Gewichtsmessungen');
          if (text.indexOf('Gewichtsmessungen') === -1) text += ' | ' + wData.weights.length + ' Gewichtsmessungen';
          infoEl.textContent = text;
          buildDashboard(currentDays);
        });
    } else {
      msg.style.color = 'var(--red)';
      msg.textContent = result.error || 'Fehler';
    }
  })
  .catch(function() {
    msg.style.color = 'var(--red)';
    msg.textContent = 'Server nicht erreichbar';
  });
}

// Enter-Taste zum Speichern
document.getElementById('weightInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') saveWeight();
});

// ── Daten laden und initialisieren ───────────────────────────────

setChartDefaults();

// Beide Datenquellen parallel laden
var garminPromise = fetch('data/garmin_data.json')
  .then(function(response) {
    if (!response.ok) throw new Error('Datei nicht gefunden');
    return response.json();
  });

var weightPromise = fetch('data/weight_data.json')
  .then(function(response) {
    if (!response.ok) return null;
    return response.json();
  })
  .catch(function() { return null; });

Promise.all([garminPromise, weightPromise])
  .then(function(results) {
    var data = results[0];
    var wData = results[1];

    if (!data || !data.daily || !Array.isArray(data.daily)) {
      throw new Error('Ungültiges Datenformat');
    }

    allData = data;
    weightData = wData;

    // Letzte Aktualisierung anzeigen
    var infoText = '';
    if (data.last_updated) {
      var d = new Date(data.last_updated);
      infoText = 'Letzte Aktualisierung: ' + d.toLocaleDateString('de-DE') + ' ' +
        d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) +
        ' | ' + data.daily.length + ' Tage geladen';
    }
    if (wData && wData.weights) {
      infoText += ' | ' + wData.weights.length + ' Gewichtsmessungen';
    }
    document.getElementById('lastUpdated').textContent = infoText;

    // Hauptinhalt einblenden
    document.getElementById('mainContent').style.display = 'block';

    // Event-Listener für Zeitraum-Buttons
    document.querySelectorAll('.range-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.range-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        buildDashboard(parseInt(btn.getAttribute('data-days')));
      });
    });

    // Dashboard mit 4 Jahre aufbauen
    buildDashboard(1460);
  })
  .catch(function(err) {
    document.getElementById('lastUpdated').textContent = '';
    var errEl = document.getElementById('errorMsg');
    errEl.style.display = 'block';
    errEl.innerHTML =
      '<p><strong>Daten konnten nicht geladen werden</strong></p>' +
      '<p style="margin-top:10px;color:var(--text-muted);font-size:0.9rem;">' +
      'Stelle sicher, dass <code>data/garmin_data.json</code> existiert.<br>' +
      'Führe zuerst <code>python garmin_fetch.py</code> aus.</p>';
    console.error('Fehler beim Laden:', err);
  });
</script>
